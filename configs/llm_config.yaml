enabled: true
enabled_handlers: []
timeout_ms: -1
max_retries: 1
confidence_threshold: 0.0
telemetry_enabled: true
telemetry_path: logs/llm_decisions.jsonl
graph_trace_enabled: true
graph_trace_path: logs/ai_player_graph.jsonl
ai_player_graph_enabled: true
battle_potion_allowed_room_types:
  - MonsterRoomElite
  - MonsterRoomBoss
langmem:
  enabled: true
  sqlite_path: dataset/langmem/memory.sqlite3
  embeddings_base_url: ""
  embeddings_api_key: ""
  embeddings_model: BAAI/bge-small-en-v1.5
  top_k: 3
  reflection_batch_size: 5
  max_semantic_memories_per_namespace: 200
  max_retrospective_memories: 30
  max_reflection_workers: 3
  min_record_confidence: 0.4
  min_similarity_score: 0.75
  fail_fast_init: true
